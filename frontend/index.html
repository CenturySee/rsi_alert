<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RSI 预警终端</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0E1116;
    --panel: #161B22;
    --panel-2: #1B222C;
    --line: #232A33;
    --line-soft: #1E242D;
    --text: #E6EAF0;
    --muted: #8A93A0;
    --faint: #5B636E;
    --up: #F0464B;     /* 涨 红 */
    --down: #1FB97A;   /* 跌 绿 */
    --gold: #E8B339;   /* 非方向性强调 */
    --gold-dim: #8a6d28;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --sans: "Space Grotesk", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .up { color: var(--up); }
  .down { color: var(--down); }

  /* ---- shell ---- */
  .app { display: flex; flex-direction: column; min-height: 100%; }

  /* ---- top bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #12161C, var(--bg));
    flex-wrap: wrap;
    position: relative; z-index: 30; /* 浮于空状态遮罩之上，保持可见可点 */
  }
  .brand { display: flex; align-items: baseline; gap: 8px; margin-right: 4px; }
  .brand b { font-weight: 700; letter-spacing: .04em; }
  .brand span { color: var(--gold); font-family: var(--mono); font-size: 12px; }
  .field { display: flex; align-items: center; gap: 6px; }
  .field label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
  input[type=text], input[type=number] {
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 7px 9px; font-family: var(--mono); font-size: 14px; width: 96px;
    outline: none; transition: border-color .15s;
  }
  input[type=number] { width: 56px; }
  input:focus { border-color: var(--gold); }
  .badge {
    font-family: var(--mono); font-size: 12px; color: var(--gold);
    border: 1px solid var(--gold-dim); border-radius: 5px; padding: 4px 8px; background: #1d1a10;
  }
  button {
    font-family: var(--sans); font-size: 13px; cursor: pointer;
    border-radius: 6px; padding: 8px 14px; border: 1px solid var(--line);
    background: var(--panel); color: var(--text); transition: all .15s;
  }
  button:hover { border-color: var(--gold); color: var(--gold); }
  button.primary { background: var(--gold); color: #14110a; border-color: var(--gold); font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); color: #14110a; }
  button.ghost { color: var(--muted); }
  .spacer { flex: 1; }

  /* ---- status strip ---- */
  .status {
    display: flex; align-items: stretch; gap: 0;
    border-bottom: 1px solid var(--line); background: var(--panel);
    position: relative; z-index: 30;
  }
  .stat { padding: 14px 22px; border-right: 1px solid var(--line-soft); display: flex; flex-direction: column; gap: 4px; }
  .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .stat .v { font-family: var(--mono); font-size: 26px; font-weight: 600; line-height: 1; }
  .stat .sub { font-family: var(--mono); font-size: 12px; color: var(--faint); }
  .stat.rsi .v { font-size: 34px; }
  .rsi-gauge { width: 120px; height: 4px; background: var(--line); border-radius: 2px; margin-top: 6px; position: relative; overflow: hidden; }
  .rsi-gauge i { position: absolute; top: 0; left: 0; height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s; }

  /* ---- main grid ---- */
  .main { display: grid; grid-template-columns: 1fr 340px; gap: 0; flex: 1; min-height: 0; }
  .charts { border-right: 1px solid var(--line); display: flex; flex-direction: column; }
  #chart { height: 82vh; min-height: 520px; }

  /* ---- ladder (signature) ---- */
  .ladder { padding: 14px 16px; overflow-y: auto; }
  .ladder h2 {
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
    margin: 0 0 10px; font-weight: 600; display: flex; justify-content: space-between;
  }
  .ladder h2 .day { color: var(--gold); }
  .rung {
    display: grid; grid-template-columns: 54px 1fr auto; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 7px; border: 1px solid transparent;
    cursor: default; transition: background .12s, border-color .12s;
  }
  .rung:hover { background: var(--panel-2); border-color: var(--line); }
  .rung .lvl { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .rung .price { font-family: var(--mono); font-size: 17px; font-weight: 600; text-align: right; }
  .rung .pct { font-family: var(--mono); font-size: 12px; text-align: right; min-width: 58px; }
  .rung.muted .price, .rung.muted .pct { color: var(--faint); font-weight: 400; }
  .rung .tag { font-family: var(--mono); font-size: 12px; color: var(--faint); text-align: right; }
  .pivot {
    display: flex; justify-content: space-between; align-items: baseline;
    margin: 12px 2px; padding: 8px 10px; border-top: 1px dashed var(--line); border-bottom: 1px dashed var(--line);
  }
  .pivot .k { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
  .pivot .v { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--gold); }

  /* ---- states ---- */
  .overlay {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(14,17,22,.72); backdrop-filter: blur(2px); z-index: 20; flex-direction: column; gap: 14px;
    pointer-events: none; /* 不拦截顶栏控件的点击 */
  }
  .overlay.show { display: flex; }
  .overlay .msg { color: var(--muted); font-family: var(--mono); font-size: 13px; max-width: 420px; text-align: center; line-height: 1.6; }
  .overlay .msg b { color: var(--up); }
  .spin { width: 26px; height: 26px; border: 2px solid var(--line); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- dialog ---- */
  dialog {
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; padding: 22px; width: 360px;
  }
  dialog::backdrop { background: rgba(8,10,13,.6); }
  dialog h3 { margin: 0 0 16px; font-size: 15px; letter-spacing: .03em; }
  dialog .row { margin-bottom: 14px; }
  dialog .row label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  dialog .row input { width: 100%; }
  dialog .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }

  @media (max-width: 880px) {
    .main { grid-template-columns: 1fr; }
    .charts { border-right: none; border-bottom: 1px solid var(--line); }
    .ladder.up-ladder { border-top: 1px solid var(--line); }
  }
</style>
</head>
<body>
<div class="app">
  <!-- top bar -->
  <header class="topbar">
    <div class="brand"><b>RSI 预警</b><span>terminal</span></div>
    <div class="field">
      <label>代码</label>
      <input id="code" type="text" inputmode="numeric" placeholder="000001" autocomplete="off" list="codeHistory" />
      <datalist id="codeHistory"></datalist>
    </div>
    <span class="badge" id="marketBadge">自动</span>
    <div class="field">
      <label>RSI</label>
      <input id="period" type="number" min="2" max="60" value="6" />
    </div>
    <button class="ghost" id="thresholdsBtn">⚙ 阈值</button>
    <button class="primary" id="queryBtn">查询</button>
    <button id="refreshBtn" title="忽略缓存，重拉行情">⟳ 强制更新</button>
    <span class="spacer"></span>
    <span class="badge" id="updatedAt">—</span>
  </header>

  <!-- status strip -->
  <section class="status">
    <div class="stat rsi">
      <span class="k">当前 RSI<span id="periodLabel">(6)</span></span>
      <span class="v num" id="rsiNow">—</span>
      <div class="rsi-gauge"><i id="rsiBar" style="width:0%"></i></div>
    </div>
    <div class="stat">
      <span class="k">距最近阈值</span>
      <span class="v num" id="nearest">—</span>
      <span class="sub" id="nearestSub">—</span>
    </div>
    <div class="stat">
      <span class="k">最新收盘</span>
      <span class="v num" id="lastClose">—</span>
      <span class="sub" id="symbolSub">—</span>
    </div>
    <div class="stat">
      <span class="k">下一交易日</span>
      <span class="v num" id="nextDay">—</span>
      <span class="sub" id="limitSub">—</span>
    </div>
  </section>

  <!-- main -->
  <div class="main">
    <div class="charts">
      <div id="chart"></div>
    </div>
    <aside class="ladder">
      <h2>↑ 上穿预警 <span class="day" id="upDay"></span></h2>
      <div id="upRungs"></div>
      <div class="pivot">
        <span class="k">当前价 · 轴心</span>
        <span class="v num" id="pivotPrice">—</span>
      </div>
      <h2>↓ 下穿预警 <span class="day" id="downDay"></span></h2>
      <div id="downRungs"></div>
    </aside>
  </div>
</div>

<!-- states -->
<div class="overlay" id="overlay">
  <div class="spin" id="spin"></div>
  <div class="msg" id="overlayMsg"></div>
</div>

<!-- thresholds dialog -->
<dialog id="thresholdsDlg">
  <h3>阈值设置</h3>
  <div class="row">
    <label>下穿阈值（逗号分隔）</label>
    <input id="downInput" type="text" class="num" />
  </div>
  <div class="row">
    <label>上穿阈值（逗号分隔）</label>
    <input id="upInput" type="text" class="num" />
  </div>
  <div class="actions">
    <button id="dlgCancel" class="ghost">取消</button>
    <button id="dlgSave" class="primary">保存并查询</button>
  </div>
</dialog>

<script>
const C = {
  up: '#F0464B', down: '#1FB97A', gold: '#E8B339',
  text: '#E6EAF0', muted: '#8A93A0', line: '#232A33', faint: '#5B636E', bg: '#0E1116'
};

// ---- persisted state ----
const store = {
  get(k, d) { try { return JSON.parse(localStorage.getItem('rsi.' + k)) ?? d; } catch { return d; } },
  set(k, v) { localStorage.setItem('rsi.' + k, JSON.stringify(v)); }
};
let period = store.get('period', 6);
let downThresholds = store.get('down', [30, 25, 20, 15, 10]);
let upThresholds = store.get('up', [75, 80]);

const $ = (id) => document.getElementById(id);
$('period').value = period;
$('periodLabel').textContent = '(' + period + ')';

// ---- 历史品种（localStorage，最多 20 条，最近的在前）----
const HISTORY_MAX = 20;
function getHistory() { return store.get('history', []); }
function renderCodeHistory() {
  $('codeHistory').innerHTML = getHistory()
    .map(c => `<option value="${c}">${inferMarket(c)}.${c}</option>`).join('');
}
function pushHistory(code) {
  let h = getHistory().filter(c => c !== code);
  h.unshift(code);
  store.set('history', h.slice(0, HISTORY_MAX));
  renderCodeHistory();
}

// ---- charts ----
// 单实例 + 多 grid：K 线主图 / 成交量副图 / RSI 副图共用同一根 x 轴，
// 一个 dataZoom 同时控制三段，缩放天然同步、永不错位；axisPointer.link 让十字光标贯穿全图。
const chart = echarts.init($('chart'), null, { renderer: 'canvas' });
window.addEventListener('resize', () => chart.resize());

let lastPayload = null;

function inferMarket(code) {
  if (/^[569]/.test(code)) return 'SH';
  if (/^[48]/.test(code) || code.startsWith('920')) return 'BJ';
  return 'SZ';
}

// ---- overlay states ----
function showLoading() { $('overlay').classList.add('show'); $('spin').style.display = 'block'; $('overlayMsg').innerHTML = '拉取行情中…'; }
function showError(msg) { $('overlay').classList.add('show'); $('spin').style.display = 'none'; $('overlayMsg').innerHTML = '<b>无法加载</b><br>' + msg; }
function hideOverlay() { $('overlay').classList.remove('show'); }

// ---- fetch ----
async function load(force) {
  const code = $('code').value.trim();
  if (!code) { showError('请输入品种代码，例如 000001'); return; }
  store.set('code', code);
  showLoading();
  const params = new URLSearchParams({
    code, period,
    down_thresholds: downThresholds.join(','),
    up_thresholds: upThresholds.join(',')
  });
  const url = (force ? '/api/refresh' : '/api/kline') + '?' + params.toString();
  try {
    const res = await fetch(url, { method: force ? 'POST' : 'GET' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || ('HTTP ' + res.status));
    }
    const data = await res.json();
    if (!data.kline || !data.kline.length) { showError('该代码没有返回行情数据，检查代码是否正确'); return; }
    lastPayload = data;
    render(data);
    hideOverlay();
    pushHistory(code);
  } catch (e) {
    showError(e.message);
  }
}

// ---- render ----
function fmtPct(p) { return (p >= 0 ? '+' : '') + p.toFixed(2) + '%'; }
function fmtP(p) { return p.toFixed(3); }   // 价格默认 3 位小数

function render(d) {
  $('marketBadge').textContent = d.market;
  $('periodLabel').textContent = '(' + d.period + ')';
  $('symbolSub').textContent = d.market + '.' + d.code;
  $('lastClose').textContent = fmtP(d.last_close);
  $('pivotPrice').textContent = fmtP(d.last_close);
  $('nextDay').textContent = d.next_trading_day || '—';
  $('limitSub').textContent = '涨跌停 ±' + (d.limit_pct * 100).toFixed(0) + '%';
  $('upDay').textContent = d.next_trading_day || '';
  $('downDay').textContent = d.next_trading_day || '';
  $('updatedAt').textContent = '更新 ' + new Date().toLocaleTimeString('zh-CN', { hour12: false });

  // current RSI
  const rsi = d.current_rsi;
  $('rsiNow').textContent = rsi.toFixed(2);
  $('rsiBar').style.width = Math.max(0, Math.min(100, rsi)) + '%';
  $('rsiNow').className = 'v num' + (rsi >= 70 ? ' up' : rsi <= 30 ? ' down' : '');

  // nearest threshold distance
  const all = d.alerts.down.concat(d.alerts.up).filter(a => a.status === 'normal');
  if (all.length) {
    let best = all[0];
    for (const a of all) if (Math.abs(a.pct_change) < Math.abs(best.pct_change)) best = a;
    const arrow = best.direction === 'down' ? '↓' : '↑';
    $('nearest').textContent = fmtPct(best.pct_change);
    $('nearest').className = 'v num ' + (best.pct_change >= 0 ? 'up' : 'down');
    $('nearestSub').textContent = arrow + ' RSI ' + (best.direction === 'down' ? '<' : '>') + ' ' + best.threshold + ' @ ' + fmtP(best.price);
  } else {
    $('nearest').textContent = '—'; $('nearestSub').textContent = '近端阈值均已触及或超涨跌停';
  }

  renderLadder('upRungs', d.alerts.up, 'up');
  renderLadder('downRungs', d.alerts.down, 'down');
  renderChart(d);
}

function rungHtml(a, dir) {
  const sign = dir === 'up' ? '>' : '<';
  if (a.status === 'reached')
    return `<div class="rung muted"><span class="lvl">${sign}${a.threshold}</span><span></span><span class="tag">已触及 ✓</span></div>`;
  if (a.status === 'unreachable')
    return `<div class="rung muted"><span class="lvl">${sign}${a.threshold}</span><span></span><span class="tag">需超涨跌停</span></div>`;
  const cls = a.pct_change >= 0 ? 'up' : 'down';
  return `<div class="rung" data-price="${a.price}">
    <span class="lvl">${sign}${a.threshold}</span>
    <span class="price num ${cls}">¥${fmtP(a.price)}</span>
    <span class="pct num ${cls}">${fmtPct(a.pct_change)}</span>
  </div>`;
}

function renderLadder(id, alerts, dir) {
  // 上穿：阈值由低到高（离当前价近->远，从下往上读）；下穿：由高到低
  const list = alerts.slice();
  $(id).innerHTML = list.map(a => rungHtml(a, dir)).join('');
  $(id).querySelectorAll('.rung[data-price]').forEach(el => {
    el.addEventListener('mouseenter', () => highlightTrigger(parseFloat(el.dataset.price)));
    el.addEventListener('mouseleave', () => highlightTrigger(null));
  });
}

// ---- kline ----
function triggerMarkLines(d, highlight) {
  const mk = (a, color) => a.filter(x => x.status === 'normal').map(x => ({
    yAxis: x.price,
    lineStyle: {
      color, type: 'dashed',
      width: highlight !== null && Math.abs(highlight - x.price) < 1e-6 ? 2.4 : 1,
      opacity: highlight !== null && Math.abs(highlight - x.price) > 1e-6 ? 0.25 : 0.8
    },
    label: { show: true, position: 'insideEndTop', formatter: 'RSI ' + (color === C.up ? '↑' : '↓') + x.threshold, color, fontFamily: 'IBM Plex Mono', fontSize: 10 }
  }));
  return mk(d.alerts.up, C.up).concat(mk(d.alerts.down, C.down));
}

function fmtVol(v) {
  if (v == null || isNaN(v)) return '—';
  if (v >= 1e8) return (v / 1e8).toFixed(2) + '亿';
  if (v >= 1e4) return (v / 1e4).toFixed(1) + '万';
  return '' + v;
}

// 共享 tooltip：一次性显示该日 OHLC + 成交量 + RSI
function tooltipFormatter(ps) {
  if (!ps || !ps.length) return '';
  let s = '<span style="color:' + C.muted + '">' + ps[0].axisValueLabel + '</span><br>';
  ps.forEach(p => {
    if (p.seriesType === 'candlestick') {
      const a = p.data, off = a.length >= 5 ? 1 : 0;   // candlestick 原始数据 [open,close,low,high]
      const o = a[off], c = a[off + 1], l = a[off + 2], h = a[off + 3];
      const cls = c >= o ? C.up : C.down;
      s += '开 ' + fmtP(o) + '　收 <span style="color:' + cls + '">' + fmtP(c) + '</span><br>';
      s += '高 ' + fmtP(h) + '　低 ' + fmtP(l) + '<br>';
    } else if (p.seriesName === '成交量') {
      const vol = (p.data && p.data.value != null) ? p.data.value : p.data;
      s += '量 ' + fmtVol(vol) + '<br>';
    } else if (p.seriesName && p.seriesName.indexOf('RSI') === 0) {
      const r = +p.data;
      if (!isNaN(r)) s += '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + p.color + ';margin-right:6px"></span>'
        + '<span style="color:' + p.color + '">' + p.seriesName + '</span> ' + r.toFixed(2) + '<br>';
    }
  });
  return s;
}

function renderChart(d, highlight = null) {
  const dates = d.kline.map(b => b.date);
  const candles = d.kline.map(b => [b.open, b.close, b.low, b.high]);
  const vols = d.kline.map(b => ({ value: b.volume, itemStyle: { color: b.close >= b.open ? 'rgba(240,70,75,.55)' : 'rgba(31,185,122,.55)' } }));
  const start = Math.max(0, ((dates.length - 80) / dates.length) * 100);
  const rsiLines = downThresholds.concat(upThresholds).map(t => ({
    yAxis: t, lineStyle: { color: C.faint, type: 'dotted', width: 1, opacity: .6 },
    label: { show: true, position: 'insideStartTop', formatter: '' + t, color: C.faint, fontFamily: 'IBM Plex Mono', fontSize: 10 }
  }));
  // RSI 多周期线：标准 6/12/24 + 当前预警周期 period（非标准时额外高亮一条）
  const rsiColors = { 6: C.gold, 12: '#4FA3FF', 24: '#C77DFF' };
  const curP = d.rsi_period;
  const rsiPeriods = Object.keys(d.rsi_multi || {}).map(Number).sort((a, b) => a - b);
  const rsiDefs = rsiPeriods.map(p => ({
    p,
    color: rsiColors[p] || C.text,     // 非标准周期用白色区分
    width: p === curP ? 1.9 : 1.2      // 当前预警周期加粗高亮
  }));
  const rsiSeries = rsiDefs.map((def, idx) => ({
    type: 'line', name: 'RSI' + def.p, xAxisIndex: 2, yAxisIndex: 2,
    data: d.rsi_multi[def.p] || [],
    showSymbol: false, smooth: false, connectNulls: false,
    color: def.color,                  // 统一 legend 色块 / tooltip 圆点 / 线条颜色
    itemStyle: { color: def.color },
    lineStyle: { color: def.color, width: def.width },
    ...(idx === 0 ? { markLine: { symbol: 'none', silent: true, data: rsiLines } } : {})
  }));

  chart.setOption({
    backgroundColor: 'transparent',
    animation: false,
    legend: {
      data: rsiDefs.map(def => 'RSI' + def.p), top: '73.2%', right: 22,
      itemWidth: 16, itemHeight: 2, itemGap: 14,
      textStyle: { color: C.muted, fontFamily: 'IBM Plex Mono', fontSize: 10 },
      inactiveColor: C.faint
    },
    axisPointer: { link: [{ xAxisIndex: 'all' }], label: { backgroundColor: '#12161C', borderColor: C.line, color: C.text, fontFamily: 'IBM Plex Mono' } },
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'cross', lineStyle: { color: C.faint }, crossStyle: { color: C.faint } },
      backgroundColor: '#12161C', borderColor: C.line,
      textStyle: { color: C.text, fontFamily: 'IBM Plex Mono', fontSize: 12 },
      formatter: tooltipFormatter
    },
    grid: [
      { left: 58, right: 18, top: 16, height: '50%' },
      { left: 58, right: 18, top: '60%', height: '12%' },
      { left: 58, right: 18, top: '76%', height: '15%' }
    ],
    xAxis: [
      { type: 'category', data: dates, boundaryGap: true, axisLine: { lineStyle: { color: C.line } }, axisLabel: { show: false }, axisTick: { show: false }, splitLine: { show: false } },
      { type: 'category', gridIndex: 1, data: dates, boundaryGap: true, axisLine: { lineStyle: { color: C.line } }, axisLabel: { show: false }, axisTick: { show: false }, splitLine: { show: false } },
      { type: 'category', gridIndex: 2, data: dates, boundaryGap: true, axisLine: { lineStyle: { color: C.line } }, axisLabel: { color: C.muted, fontFamily: 'IBM Plex Mono', fontSize: 10 }, axisTick: { show: false }, splitLine: { show: false } }
    ],
    yAxis: [
      { scale: true, position: 'left', splitLine: { lineStyle: { color: 'rgba(35,42,51,.5)' } }, axisLabel: { color: C.muted, fontFamily: 'IBM Plex Mono', fontSize: 10 }, axisLine: { show: false } },
      { gridIndex: 1, splitNumber: 2, axisLabel: { show: false }, splitLine: { show: false }, axisLine: { show: false } },
      { gridIndex: 2, min: 0, max: 100, interval: 25, splitLine: { lineStyle: { color: 'rgba(35,42,51,.5)' } }, axisLabel: { color: C.muted, fontFamily: 'IBM Plex Mono', fontSize: 10 }, axisLine: { show: false } }
    ],
    dataZoom: [
      { type: 'inside', xAxisIndex: [0, 1, 2], start, end: 100 },
      { type: 'slider', xAxisIndex: [0, 1, 2], bottom: 6, height: 14, start, end: 100, borderColor: C.line, fillerColor: 'rgba(232,179,57,.12)', handleStyle: { color: C.gold }, textStyle: { color: C.muted, fontFamily: 'IBM Plex Mono', fontSize: 10 }, dataBackground: { lineStyle: { color: C.line }, areaStyle: { color: 'rgba(138,147,160,.1)' } } }
    ],
    series: [
      {
        type: 'candlestick', name: 'K', data: candles,
        itemStyle: { color: C.up, color0: C.down, borderColor: C.up, borderColor0: C.down },
        markLine: { symbol: 'none', silent: true, data: triggerMarkLines(d, highlight) }
      },
      { type: 'bar', name: '成交量', xAxisIndex: 1, yAxisIndex: 1, data: vols },
      ...rsiSeries
    ]
  }, { notMerge: true });
}

// 悬停阶梯只更新主图触发价 markLine（合并写入，保留当前缩放区间，不整图重绘）
function highlightTrigger(price) {
  if (!lastPayload) return;
  chart.setOption({ series: [{ markLine: { symbol: 'none', silent: true, data: triggerMarkLines(lastPayload, price) } }] });
}

// ---- events ----
$('code').addEventListener('input', () => {
  const v = $('code').value.trim();
  $('marketBadge').textContent = v ? inferMarket(v) : '自动';
});
$('code').addEventListener('keydown', e => { if (e.key === 'Enter') load(false); });
$('period').addEventListener('change', () => {
  period = Math.max(2, parseInt($('period').value) || 6);
  $('period').value = period; store.set('period', period);
  $('periodLabel').textContent = '(' + period + ')';
  if ($('code').value.trim()) load(false);
});
$('queryBtn').addEventListener('click', () => load(false));
$('refreshBtn').addEventListener('click', () => load(true));

// thresholds dialog
const dlg = $('thresholdsDlg');
$('thresholdsBtn').addEventListener('click', () => {
  $('downInput').value = downThresholds.join(', ');
  $('upInput').value = upThresholds.join(', ');
  dlg.showModal();
});
$('dlgCancel').addEventListener('click', () => dlg.close());
$('dlgSave').addEventListener('click', () => {
  const parse = s => s.split(',').map(x => parseFloat(x.trim())).filter(x => !isNaN(x));
  const dn = parse($('downInput').value), up = parse($('upInput').value);
  if (dn.length) { downThresholds = dn.sort((a, b) => b - a); store.set('down', downThresholds); }
  if (up.length) { upThresholds = up.sort((a, b) => a - b); store.set('up', upThresholds); }
  dlg.close();
  if ($('code').value.trim()) load(false);
});

// init
renderCodeHistory();
const savedCode = store.get('code', '');
if (savedCode) { $('code').value = savedCode; $('marketBadge').textContent = inferMarket(savedCode); load(false); }
else { $('overlay').classList.add('show'); $('spin').style.display = 'none'; $('overlayMsg').innerHTML = '输入品种代码开始 — 例如 <b style="color:var(--gold)">000001</b>，回车查询'; }
</script>
</body>
</html>
